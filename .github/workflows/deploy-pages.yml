name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build bridge-child
        working-directory: bridge-child
        env:
          PUBLIC_URL: /JuliaGekhter/bridge-child
          CI: false
        run: |
          npm install
          npm run build

      - name: Build dose-calculator
        working-directory: dose-calculator
        env:
          PUBLIC_URL: /JuliaGekhter/dose-calculator
          CI: false
        run: |
          npm install
          npm run build

      - name: Build wellness-check
        working-directory: wellness-check
        env:
          PUBLIC_URL: /JuliaGekhter/wellness-check
          CI: false
        run: |
          npm install
          npm run build

      - name: Build reel-method
        working-directory: reel-method
        env:
          PUBLIC_URL: /JuliaGekhter/reel-method
          CI: false
        run: |
          npm install
          npm run build

      - name: Build stw-landing
        working-directory: stw-landing
        env:
          PUBLIC_URL: /JuliaGekhter
          CI: false
        run: |
          npm install
          npm run build

      - name: Assemble dist
        run: |
          mkdir -p dist/bridge-child dist/dose-calculator dist/wellness-check dist/reel-method
          cp -r stw-landing/build/* dist/
          cp -r bridge-child/build/* dist/bridge-child/
          cp -r dose-calculator/build/* dist/dose-calculator/
          cp -r wellness-check/build/* dist/wellness-check/
          cp -r reel-method/build/* dist/reel-method/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
